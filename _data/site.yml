  eyebrow: "Otherworld Children's Media Presents"
  title_image: "/assets/images/title-art.webp"
  title_alt: "Treasure Island — A Telling for the New World"
  tagline_image: "/assets/images/tagline.webp"
  tagline_alt: "Prepare Yourself! For the most thrilling pirate story ever written..."
  ship_image: "/assets/images/hero-ship.webp"
  description: >-
    Treasure Island: A Telling for the New World is a series of 8 hour-long
    audio episodes. This unabridged adaptation of the classic novel by R.L.
    Stevenson resets the story in the Bayous, the Port of New Orleans, and the
    Caribbean at the end of the Golden Age of Piracy in 1828.
