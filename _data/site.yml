broadcast_info:
  label: Broadcast Info
  headline: Coming to Public Radio
  description: >-
    Treasure Island is coming to public radio stations across the country.
    Air dates, carriage details, and listening information will be posted here
    as stations announce their schedules.

about:
  label: About
  headline: A Telling for the New World
  description: >-
    This historic radio drama reimagines Treasure Island in the Louisiana
    Bayou, the Port of New Orleans, and the Caribbean, ten years after the War
    of 1812 during the last gasp of piracy in the New World.

episodes:
  - number: 1
    numeral: I
    title: "The Old Sea-Dog at the Admiral Benbow"
    player_title: "Chapter I — The Old Sea-Dog"
    subtitle: "Opening excerpt · Long John Silver arrives"
    duration: "3:24"
    seconds: 204
  - number: 2
    numeral: II
    title: "The Black Spot"
    player_title: "Chapter II — The Black Spot"
    subtitle: "A warning is delivered in shadow"
    duration: "2:58"
    seconds: 178
  - number: 3
    numeral: III
    title: "The Map"
    player_title: "Chapter III — The Map"
    subtitle: "The treasure map is revealed"
    duration: "3:11"
    seconds: 191

