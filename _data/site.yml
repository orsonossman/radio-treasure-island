production:
  - label: Sound Design
    name: Randy Thom
    description: >-
      Skywalker Sound — the legendary designer behind Apocalypse Now, Cast
      Away, and The Right Stuff brings cinematic depth to every scene.
  - label: Music
    name: Taj Mahal
    description: >-
      Blues legend and Grammy winner Taj Mahal provides an original score rooted
      in the Creole, Caribbean, and West African traditions of the era.
  - label: Adaptation
    name: "Eight Hours · Eight Chapters"
    description: >-
      An unabridged re-imagining set in the Louisiana Bayou, Port of New
      Orleans, and the Caribbean — during the last gasp of piracy in the New
      World.
  - label: "Illustrations & Design"
    name: Max Cole-Takanikos
    description: >-
      Graphic design and original illustrations by artist Max Cole-Takanikos,
      whose work echoes the broadside and handbill tradition of the 19th
      century.

notify:
  label: Coming to Public Radio
  headline: Be the first to know when it airs.
  description: >-
    Treasure Island is coming to public radio stations across the country.
    Leave your email and we'll tell you the moment it's on the air near you.
  success: "You're on the list. Fair winds to you."
  footnote: "No barnacles. Unsubscribe any time."

