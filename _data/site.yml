  paragraphs:
    - >-
      Treasure Island: A Telling for the New World is a series of 8 hour-long
      audio episodes for distribution on Public Radio Stations nationwide. The
      production is based on the original novel by R.L. Stevenson, resetting
      the story in the Bayous, the Port of New Orleans, and the Caribbean at
      the end of the Golden Age of Piracy. Recorded primarily on location at 
      Quigley on Whidbey Island, Wa.
    - >-
      This approach to Treasure Island takes a traditional literary classic and
      re-envisions it through context, casting, and music. By broadening
      audience appeal and cultural inclusivity, we enliven an old tale for a
      modern audience and encourage deeper listening and understanding.
    - >-
      The production stars the voices of Keith David as Long John Silver, John
      Goodman as Billy Bones, and Glynn Turman as James Hawkins/storyteller,
      along with members of the Grammy-Nominated Firesign Theatre and a large
      supporting cast of actors from stage, screen, and television.
    - >-
      Music Director is multiple Grammy-winner Blues legend Taj Mahal and Sound
      Design is supervised by Oscar-winner Randy Thom of Skywalker Sound.
    - >-
      The producing entity, Otherworld Media aka Otherworld Children's Media,
      has been producing award-winning, Grammy-nominated productions for over
      forty years. Titles from the catalogue include The War of the Worlds 50th
      Anniversary Production, Empire of the Air: The Men who Made Radio, The
      Wonderful Wizard of Oz Centennial Production, Agatha Christie's BBC
      Murders, Raymond Chandler's Goldfish, Which Way's Witch: A June Foray
      Halloween Spell, and The International Mystery Writer's Festival:
      Discovering New Mysteries.

