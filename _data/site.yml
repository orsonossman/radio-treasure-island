hero:
  eyebrow: "Otherworld Children's Media Presents"
  title_image: "/assets/images/title-art.webp"
  title_alt: "Treasure Island — A Telling for the New World"
  tagline_image: "/assets/images/tagline.webp"
  tagline_alt: "Prepare Yourself! For the most thrilling pirate story ever written..."
  ship_image: "/assets/images/hero-ship.webp"
  description: >-
    An historic radio drama in eight chapters — re-set in the Louisiana Bayou,
    the Port of New Orleans, and the Caribbean, ten years after the War of
    1812. With cinematic sound design by Randy Thom of Skywalker Sound.
  primary_cta:
    label: Hear the Excerpts
    href: "#listen"
  secondary_cta:
    label: Get Notified
    href: "#notify"

